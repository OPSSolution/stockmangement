services:
  - type: web
    name: stockmanagement
    runtime: node
    plan: free
    buildCommand: npm install && rm -rf .vite out && NODE_ENV=production npm run build
    startCommand: npx tsx server/index.ts
    envVars:
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard after deploy
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
